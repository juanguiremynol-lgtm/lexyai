    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root">
      <div id="atenia-loader" style="
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: hsl(220 25% 5%);
        transition: opacity 0.4s ease-out;
      ">
        <style>
          @keyframes atenia-pulse {
            0%, 100% { opacity: 0.55; transform: scale(1); filter: drop-shadow(0 0 8px rgba(212,160,23,0.3)); }
            50% { opacity: 1; transform: scale(1.06); filter: drop-shadow(0 0 24px rgba(212,160,23,0.6)); }
          }
          @keyframes atenia-fade-text {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
          }
          #atenia-loader svg { animation: atenia-pulse 2s ease-in-out infinite; }
          #atenia-loader .loader-text { 
            margin-top: 20px; font-family: Inter, system-ui, sans-serif; font-size: 14px;
            color: rgba(255,255,255,0.7); letter-spacing: 0.05em;
            animation: atenia-fade-text 2s ease-in-out infinite;
          }
          #atenia-loader .loader-brand {
            margin-top: 8px; font-family: Inter, system-ui, sans-serif; font-size: 11px;
            color: rgba(255,255,255,0.35); letter-spacing: 0.15em; text-transform: uppercase;
          }
        </style>
        <svg viewBox="0 0 48 48" width="64" height="64" fill="none" aria-hidden="true">
          <ellipse cx="24" cy="26" rx="22" ry="8" stroke="rgba(212,160,23,0.7)" stroke-width="1.5" fill="none"/>
          <circle cx="24" cy="22" r="14" fill="rgba(10,20,50,0.9)" stroke="rgba(14,165,233,0.6)" stroke-width="1.5"/>
          <text x="24" y="28" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="rgba(212,160,23,1)">A</text>
          <circle cx="16" cy="15" r="1" fill="rgba(14,165,233,0.8)"/>
          <circle cx="32" cy="18" r="0.8" fill="rgba(212,160,23,0.8)"/>
          <circle cx="28" cy="13" r="0.6" fill="white" opacity="0.5"/>
        </svg>
        <div class="loader-text">Cargando...</div>
        <div class="loader-brand">Andromeda</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 1) {
          const loader = document.getElementById('atenia-loader');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 400);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
